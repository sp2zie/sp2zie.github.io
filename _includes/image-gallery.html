<style>
  .image-gallery {
    gap: 1rem;
    overflow-x: hidden;
    max-width: 100%;
  }

  .image-gallery .card {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
  }

  .image-gallery .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
  }

  .image-gallery .card-img-top {
    height: 250px;
    object-fit: cover;
    max-width: 100%;
  }

  /* Modal styles */
  .img-modal {
    display: none;
    position: fixed;
    z-index: 9999;
    padding: 2rem;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    text-align: center;
  }

  .img-modal img {
    max-width: 90%;
    max-height: 90%;
  }

  .img-modal.active {
    display: block;
  }
</style>

<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3 image-gallery">
  {% for file in site.static_files %}
  {% if file.path contains include.folder and file.extname == '.jpg' or file.extname == '.JPG' or file.extname == '.png' %}
  {% assign title = file.path | split: '/' | last | replace: file.extname, '' %}
  <div class="col">
    <div class="card h-100 border-0 shadow-sm" onclick="openModal('{{ file.path }}')">
      <img src="{{ file.path }}" alt="{{ title }}" class="card-img-top rounded-top"/>
    </div>
  </div>
  {% endif %}
  {% endfor %}
</div>

<!-- Modal -->
<div id="imgModal" class="img-modal" onclick="closeModal()">
  <img id="modalImage" src="" alt="">
</div>

<script>
  function openModal(src) {
    const modal = document.getElementById("imgModal");
    const modalImg = document.getElementById("modalImage");
    modalImg.src = src;
    modal.classList.add("active");
  }

  function closeModal() {
    document.getElementById("imgModal").classList.remove("active");
  }
</script>
